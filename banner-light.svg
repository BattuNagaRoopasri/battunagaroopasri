<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8FC">
        <animate attributeName="stop-color"
                 values="#FFF8FC;#FFEAF6;#FFF8FC"
                 dur="8s"
                 repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#F2E8FF">
        <animate attributeName="stop-color"
                 values="#F2E8FF;#FFDDEE;#F2E8FF"
                 dur="8s"
                 repeatCount="indefinite"/>
      </stop>

    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="8"
        flood-opacity="0.15"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Floating circles -->

  <circle cx="120" cy="80" r="12" fill="#FF69B4" opacity=".2">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="250" cy="420" r="20" fill="#C084FC" opacity=".18">
      <animate attributeName="cy" values="420;390;420" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="720" cy="90" r="14" fill="#FDB4D8" opacity=".25">
      <animate attributeName="cy" values="90;60;90" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Heading -->

  <text x="80"
        y="95"
        font-size="28"
        font-family="Segoe UI"
        fill="#FF69B4">
        👋 Hello, I'm
  </text>

  <text x="80"
        y="160"
        font-size="54"
        font-family="Segoe UI"
        font-weight="700"
        fill="#333333"
        filter="url(#glow)">
        Battu Naga Roopa Sri
  </text>

  <!-- Typing Effect -->

  <text x="80"
        y="230"
        font-size="32"
        fill="#7C3AED"
        font-family="Consolas">

      Full Stack Developer

      <animate attributeName="opacity"
               values="1;0;1"
               dur="3s"
               repeatCount="indefinite"/>

  </text>

  <!-- Quote -->

  <text x="80"
        y="300"
        font-size="24"
        fill="#555"
        font-family="Segoe UI">
        💖 Turning ideas into code,
  </text>

  <text x="80"
        y="335"
        font-size="24"
        fill="#555"
        font-family="Segoe UI">
        one commit at a time ✨
  </text>

  <!-- Tech badges -->

  <g font-family="Segoe UI" font-size="18">

    <rect x="80" y="390" width="90" height="34" rx="17" fill="#FFE0F0"/>
    <text x="110" y="413" text-anchor="middle">Java</text>

    <rect x="180" y="390" width="90" height="34" rx="17" fill="#EDE9FE"/>
    <text x="225" y="413" text-anchor="middle">React</text>

    <rect x="280" y="390" width="90" height="34" rx="17" fill="#DCFCE7"/>
    <text x="325" y="413" text-anchor="middle">Node</text>

    <rect x="380" y="390" width="110" height="34" rx="17" fill="#FEF3C7"/>
    <text x="435" y="413" text-anchor="middle">MongoDB</text>

    <rect x="505" y="390" width="95" height="34" rx="17" fill="#DBEAFE"/>
    <text x="552" y="413" text-anchor="middle">Python</text>

  </g>

  <!-- Character -->

  <image
      href="./RoopaSri.png"
      x="1050"
      y="20"
      width="450"
      height="460">

      <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0;0 -8;0 0"
          dur="4s"
          repeatCount="indefinite"/>

  </image>

  <!-- Sparkles -->

  <text x="1030" y="90" font-size="22">✨</text>
  <text x="1460" y="70" font-size="24">🌸</text>
  <text x="1510" y="250" font-size="20">✨</text>
  <text x="1080" y="430" font-size="22">💖</text>

</svg>
