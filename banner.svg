<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="1280"
    height="740"
    viewBox="0 0 1280 740">

<title>Battu Naga Roopa Sri Animated Banner</title>

<style><![CDATA[

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

text{
    font-family:Poppins,sans-serif;
}

.bgPulse{
    animation:bgPulse 8s infinite alternate;
}

@keyframes bgPulse{

0%{
filter:brightness(100%);
}

100%{
filter:brightness(120%);
}

}

.float{

animation:float 6s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}

}

.twinkle{

animation:twinkle 2s infinite;

}

@keyframes twinkle{

0%{opacity:.2;}
50%{opacity:1;}
100%{opacity:.2;}

}

.orb{

animation:orb 10s infinite alternate;

}

@keyframes orb{

from{
transform:translateY(-15px);
}

to{
transform:translateY(20px);
}

}

.cursor{

animation:blink 1s infinite;

}

@keyframes blink{

50%{
opacity:0;
}

}

.tech{

opacity:0;

animation:fadein .6s forwards;

}

.tech:nth-child(1){animation-delay:2s;}
.tech:nth-child(2){animation-delay:2.3s;}
.tech:nth-child(3){animation-delay:2.6s;}
.tech:nth-child(4){animation-delay:2.9s;}
.tech:nth-child(5){animation-delay:3.2s;}
.tech:nth-child(6){animation-delay:3.5s;}

@keyframes fadein{

to{
opacity:1;
}

}

]]></style>

<defs>

<linearGradient id="bgGrad" x1="0" x2="1">

<stop offset="0%" stop-color="#170022"/>

<stop offset="50%" stop-color="#42135d"/>

<stop offset="100%" stop-color="#8b1fa9"/>

<animate attributeName="x1"
values="0;1;0"
dur="12s"
repeatCount="indefinite"/>

</linearGradient>

<linearGradient id="pinkGrad">

<stop offset="0%" stop-color="#ff7ac8"/>

<stop offset="100%" stop-color="#b95cff"/>

<animate attributeName="x1"
values="0;1;0"
dur="5s"
repeatCount="indefinite"/>

</linearGradient>

<filter id="glow">

<feGaussianBlur stdDeviation="5" result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>

<clipPath id="bannerClip">

<rect
x="20"
y="20"
rx="40"
ry="40"
width="1240"
height="700"/>

</clipPath>

</defs>

<g clip-path="url(#bannerClip)">

<rect
width="1280"
height="740"
fill="url(#bgGrad)"
class="bgPulse"/>

<!-- Ambient Orbs -->

<circle
cx="180"
cy="160"
r="120"
fill="#ff69b4"
opacity=".08"
class="orb"/>

<circle
cx="1050"
cy="560"
r="160"
fill="#9d4dff"
opacity=".08"
class="orb"/>

<circle
cx="840"
cy="180"
r="90"
fill="#ff89dd"
opacity=".05"
class="orb"/>

<!-- Stars -->

<g class="twinkle">

<circle cx="90" cy="90" r="2" fill="white"/>
<circle cx="240" cy="180" r="2" fill="white"/>
<circle cx="340" cy="120" r="2" fill="white"/>
<circle cx="610" cy="60" r="2" fill="white"/>
<circle cx="760" cy="130" r="2" fill="white"/>
<circle cx="970" cy="200" r="2" fill="white"/>
<circle cx="1180" cy="90" r="2" fill="white"/>

</g>

<!-- Floating Hearts -->

<g class="float">

<text
x="1030"
y="110"
font-size="26"
fill="#ff8fd7">❤</text>

<text
x="1080"
y="180"
font-size="18"
fill="#ff69b4">❤</text>

<text
x="1140"
y="140"
font-size="24"
fill="#ffb7e6">❤</text>

</g>

<!-- Terminal -->

<rect
x="60"
y="70"
width="620"
height="80"
rx="20"
fill="#100414"
stroke="#ff71c9"
stroke-width="2"/>

<circle cx="95" cy="105" r="7" fill="#ff5f57"/>
<circle cx="120" cy="105" r="7" fill="#ffbd2e"/>
<circle cx="145" cy="105" r="7" fill="#28ca41"/>

<text
x="90"
y="132"
font-size="26"
fill="#ffffff">

user@dev:~$ cat README.md

<tspan class="cursor">|</tspan>

</text>

<!-- Name -->

<text
x="70"
y="240"
font-size="54"
font-weight="700"
fill="url(#pinkGrad)"
filter="url(#glow)">

Battu Naga Roopa Sri

</text>

<!-- Role -->

<text
x="70"
y="290"
font-size="28"
fill="#ffd7f5">

Software Engineer

<animate
attributeName="opacity"
values="1;0;0;1"
dur="9s"
repeatCount="indefinite"/>

</text>

<text
x="70"
y="290"
font-size="28"
fill="#ffd7f5"
opacity="0">

<animate
attributeName="opacity"
values="0;1;1;0"
begin="3s"
dur="9s"
repeatCount="indefinite"/>

Full Stack Developer

</text>

<text
x="70"
y="290"
font-size="28"
fill="#ffd7f5"
opacity="0">

<animate
attributeName="opacity"
values="0;1;1;0"
begin="6s"
dur="9s"
repeatCount="indefinite"/>

MERN Stack Developer

</text>

<!-- Quote Box -->

<rect
x="70"
y="340"
width="520"
height="90"
rx="18"
fill="#ffffff10"
stroke="#ff71c9"/>

<text
x="95"
y="392"
font-size="24"
fill="#ffffff">

Turning ideas into code,

</text>

<text
x="95"
y="420"
font-size="24"
fill="#ff9ee4">

one commit at a time 💖✨

</text>

<!-- Tech Pills -->

<g>

<rect class="tech" x="70" y="470" width="95" height="42" rx="20" fill="#ff69b4"/>
<text x="95" y="497" fill="white">Java</text>

<rect class="tech" x="180" y="470" width="120" height="42" rx="20" fill="#d55cff"/>
<text x="198" y="497" fill="white">React.js</text>

<rect class="tech" x="320" y="470" width="115" height="42" rx="20" fill="#a850ff"/>
<text x="342" y="497" fill="white">Node.js</text>

<rect class="tech" x="450" y="470" width="120" height="42" rx="20" fill="#ff7dc6"/>
<text x="466" y="497" fill="white">Express</text>

</g>


<!-- ================= RIGHT PANEL ================= -->

<!-- Character Card -->

<g id="character">

  <rect
      x="770"
      y="90"
      width="420"
      height="560"
      rx="30"
      fill="#ffffff08"
      stroke="#ff7bcf"
      stroke-width="2"/>

  <!-- Avatar Glow -->

  <circle
      cx="980"
      cy="275"
      r="150"
      fill="#ff7bcf"
      opacity=".10">

      <animate
          attributeName="r"
          values="145;155;145"
          dur="4s"
          repeatCount="indefinite"/>

  </circle>

  <!-- Replace href with embedded Base64 PNG later -->

  <image
      id="avatar"
      x="840"
      y="120"
      width="280"
      height="340"
      preserveAspectRatio="xMidYMid meet"
      opacity="0"
      href="avatar.png">

      <!-- Hologram reveal -->

      <animate
          attributeName="opacity"
          from="0"
          to="1"
          dur="1.2s"
          begin="0.4s"
          fill="freeze"/>

  </image>

  <!-- Scan Line -->

  <rect
      x="835"
      y="120"
      width="290"
      height="6"
      fill="#7ffcff"
      opacity=".8">

      <animate
          attributeName="y"
          values="120;455;120"
          dur="3.5s"
          repeatCount="indefinite"/>

  </rect>

</g>

<!-- ================= ABOUT ================= -->

<text
    x="790"
    y="500"
    font-size="30"
    fill="#ffb9e8"
    font-weight="700">

About Me

</text>

<text
    x="790"
    y="540"
    font-size="22"
    fill="white">

🌸 Software Engineer

</text>

<text
    x="790"
    y="575"
    font-size="22"
    fill="white">

💻 MERN Stack Developer

</text>

<text
    x="790"
    y="610"
    font-size="22"
    fill="white">

💖 Open Source Enthusiast

</text>

<!-- ================= STATS ================= -->

<text
    x="70"
    y="560"
    font-size="24"
    fill="#ffd5f4">

GitHub Progress

</text>

<rect
    x="70"
    y="580"
    width="450"
    height="18"
    rx="10"
    fill="#ffffff20"/>

<rect
    x="70"
    y="580"
    width="0"
    height="18"
    rx="10"
    fill="url(#pinkGrad)">

    <animate
        attributeName="width"
        values="0;420"
        dur="2.5s"
        fill="freeze"/>

</rect>

<!-- ================= CODE EDITOR ================= -->

<g>

<rect
    x="70"
    y="620"
    width="620"
    height="90"
    rx="18"
    fill="#0f1118"
    stroke="#ff6cc8"/>

<text
    x="95"
    y="650"
    font-size="20"
    fill="#7fffd4">

const buildDreams = () =&gt; {

</text>

<text
    x="120"
    y="680"
    font-size="20"
    fill="#ffffff">

return "Code • Learn • Grow 💖";

</text>

<text
    x="95"
    y="705"
    font-size="20"
    fill="#7fffd4">

};

</text>

</g>

<!-- ================= NEON SIGN ================= -->

<text
    x="700"
    y="60"
    font-size="24"
    font-weight="700"
    fill="#ff8fd7"
    filter="url(#glow)">

KEEP CODING • KEEP GROWING

<animate
    attributeName="opacity"
    values="1;.4;1;.7;1"
    dur="2.2s"
    repeatCount="indefinite"/>

</text>

<!-- ================= FLOATING PARTICLES ================= -->

<g fill="#ffd5f4">

<circle cx="1040" cy="640" r="3">
    <animate attributeName="cy"
             values="640;40"
             dur="8s"
             repeatCount="indefinite"/>
</circle>

<circle cx="1120" cy="680" r="2">
    <animate attributeName="cy"
             values="680;60"
             dur="6s"
             repeatCount="indefinite"/>
</circle>

<circle cx="1180" cy="700" r="4">
    <animate attributeName="cy"
             values="700;80"
             dur="7s"
             repeatCount="indefinite"/>
</circle>

</g>

</g>

</svg>

